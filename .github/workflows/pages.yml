name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      TESLA_API_BASE: ${{ vars.TESLA_API_BASE || secrets.TESLA_API_BASE || '' }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF || '' }}
      SUPABASE_FUNCTION_NAME: ${{ vars.SUPABASE_FUNCTION_NAME || 'tesla-api' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve backend API URL
        run: |
          set -euo pipefail
          # Auto-resolve TESLA_API_BASE from Supabase project ref if not explicitly set
          if [ -z "${TESLA_API_BASE:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
            TESLA_API_BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/${SUPABASE_FUNCTION_NAME}/api"
            echo "TESLA_API_BASE=$TESLA_API_BASE" >> "$GITHUB_ENV"
            echo "✓ Auto-resolved TESLA_API_BASE from SUPABASE_PROJECT_REF: $TESLA_API_BASE"
          elif [ -z "${TESLA_API_BASE:-}" ]; then
            echo "ℹ TESLA_API_BASE not configured — frontend will use built-in production fallback."
          fi

      - name: Validate backend API configuration
        run: node .github/tools/inject-tesla-api-base.mjs

      - name: Smoke test backend health endpoint
        if: env.TESLA_API_BASE != ''
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 20 "$TESLA_API_BASE/health" || echo "⚠ Health check failed — continuing deployment (frontend has fallback)."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
